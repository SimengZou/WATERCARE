  - name: impa_kw
    description: 'Impairment Type (keyword). Allowed values: tffam.impa.fis.acc, tffam.impa.not.fis.acc,
      tffam.impa.rev.fis.acc, tffam.impa.not.rev.fis.acc, tffam.impa.not.app'
