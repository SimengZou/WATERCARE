version: 2
models:
- name: tcccp060
  columns:
  - name: compnr
    description: (required) Company number
    data_tests:
    - not_null
  - name: cpdt
    description: '(required) Period Table Code. Max length: 6'
    data_tests:
    - not_null
  - name: dsca__en_us
    description: '(required) Description - base language. Max length: 30'
    data_tests:
    - not_null
  - name: dura
    description: Duration
  - name: dtyp
    description: 'Duration Type. Allowed values: 1, 2, 3, 4, 5, 6, 7, 100'
  - name: dtyp_kw
    description: 'Duration Type (keyword). Allowed values: tcccp.kyrp.day, tcccp.kyrp.week,
      tcccp.kyrp.4weeks, tcccp.kyrp.month, tcccp.kyrp.quarter, tcccp.kyrp.halfyear,
      tcccp.kyrp.year, tcccp.kyrp.not.appl'
  - name: sttm
    description: Start Time
  - name: ychk
    description: 'Check for Date in Year. Allowed values: 1, 2'
  - name: ychk_kw
    description: 'Check for Date in Year (keyword). Allowed values: tcyesno.yes, tcyesno.no'
  - name: mchk
    description: 'Modification Allowed. Allowed values: 1, 2, 3'
  - name: mchk_kw
    description: 'Modification Allowed (keyword). Allowed values: tcccp.mchk.yes,
      tcccp.mchk.restricted, tcccp.mchk.no'
  - name: gchk
    description: 'Gaps Allowed between Years. Allowed values: 1, 2'
  - name: gchk_kw
    description: 'Gaps Allowed between Years (keyword). Allowed values: tcyesno.yes,
      tcyesno.no'
  - name: tzid
    description: 'Time Zone Code. Max length: 3'
  - name: deleted
    description: (required) Whether record is deleted
    data_tests:
    - not_null
  - name: username
    description: '(required) User responsible for record action. Max length: 8'
    data_tests:
    - not_null
  - name: timestamp
    description: (required) Time the action occurred
    data_tests:
    - not_null
  - name: sequencenumber
    description: (required) Sequence number of the action
    data_tests:
    - not_null
  - name: etl_load_datetime
    description: The datetime in which the ETL process loaded the data into the curated
      layer.
  - name: etl_load_metadatafilename
    description: The filename of the metadata file that was used to load the data
      into the curated layer.
  - name: dbt_record_updated_at
    description: The datetime in which the record was last updated by dbt.
  - name: dbt_record_created_at
    description: The datetime in which the record was created by dbt.
  - name: dbt_invocation_id
    description: The invocation ID of the dbt run that created the record.
  - name: dbt_surrogate_key
    description: Hashed key based on primary key/s of table, or all keys excluding
      dbt and etl metadata.
  description: LN tcccp060 Period Tables table, Generated 2026-04-10T19:40:59Z from
    package combination ce01101
  data_tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns:
        - compnr
        - cpdt
