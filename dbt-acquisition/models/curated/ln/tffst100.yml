    description: 'Use Annexure (keyword). Allowed values: tcyesno.yes, tcyesno.no'
  - name: salt
    description: 'Annexure Layout. Max length: 8'
  - name: altp
    description: 'Annexure Layout Type. Allowed values: 10, 20, 30, 99'
