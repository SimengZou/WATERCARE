  - name: nstm
    description: 'Next Statement. Max length: 8'
  - name: stlt
    description: 'Layout. Max length: 8'
  - name: sltp
    description: 'Layout Type. Allowed values: 10, 20, 30, 99'
  - name: sltp_kw
