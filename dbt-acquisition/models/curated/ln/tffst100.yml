  - name: cagr
    description: 'Calculation Group. Max length: 3'
  - name: ptra
    description: 'Process Transactions. Allowed values: 1, 2, 3, 4'
  - name: ptra_kw
    description: 'Process Transactions (keyword). Allowed values: tffst.ptra.none,
