version: 2
models:
- name: whinh540
  columns:
  - name: compnr
    description: (required) Company number
    data_tests:
    - not_null
  - name: cwar
    description: '(required) Warehouse. Max length: 6'
    data_tests:
    - not_null
  - name: loca
    description: '(required) Location. Max length: 10'
    data_tests:
    - not_null
  - name: item
    description: '(required) Item. Max length: 47'
    data_tests:
    - not_null
  - name: clot
    description: '(required) Lot. Max length: 20'
    data_tests:
    - not_null
  - name: date
    description: (required) Inventory Date
    data_tests:
    - not_null
  - name: lcdt
    description: Last Counting Date
  - name: fcnt
    description: 'Force Cycle Count. Allowed values: 1, 2'
  - name: fcnt_kw
    description: 'Force Cycle Count (keyword). Allowed values: tcyesno.yes, tcyesno.no'
  - name: orno
    description: 'Order. Max length: 9'
  - name: cntn
    description: Count Number
  - name: pono
    description: Line
  - name: cwar_loca_ref_compnr
