      40, 50, 60, 70, 80, 90, 100, 110, 120, 125, 127'
  - name: spec_kw
    description: 'Point of Title Passage Specification (keyword). Allowed values:
      tcmcs.spec.adnm, tcmcs.spec.name2, tcmcs.spec.addr, tcmcs.spec.addr2, tcmcs.spec.city,
      tcmcs.spec.city2, tcmcs.spec.prov, tcmcs.spec.ccty, tcmcs.spec.adnm.prov.ccty,
      tcmcs.spec.addr2.prov.ccty, tcmcs.spec.city.prov.ccty, tcmcs.spec.city2.prov.ccty,
      tcmcs.spec.named.loc, tcmcs.spec.not.appl'
