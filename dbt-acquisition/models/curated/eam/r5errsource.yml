    description: ERS_LASTSAVED
  - name: ers_type
    description: ERS_TYPE
  - name: ers_desc
    description: ERS_DESC
  - name: ers_code
    description: ERS_CODE
  - name: ers_name
    description: ERS_NAME
  - name: ers_updatecount
