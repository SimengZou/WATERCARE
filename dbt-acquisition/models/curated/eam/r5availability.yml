    description: AVL_LASTSAVED
  - name: avl_nethours
    description: AVL_NETHOURS
  - name: avl_hirhours
    description: AVL_HIRHOURS
  - name: avl_nethired
    description: AVL_NETHIRED
  - name: avl_date
    description: AVL_DATE
  - name: avl_mrc
    description: AVL_MRC
  - name: avl_trade
    description: AVL_TRADE
  - name: avl_updatecount
