    description: CWR_LASTSAVED
  - name: cwr_date
    description: CWR_DATE
  - name: cwr_org
    description: CWR_ORG
  - name: cwr_mrc
    description: CWR_MRC
  - name: cwr_wosreported
    description: CWR_WOSREPORTED
  - name: _deleted
    description: Deleted Record Indicator
