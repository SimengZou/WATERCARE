    description: UGD_LASTSAVED
  - name: ugd_userid
    description: UGD_USERID
  - name: ugd_gisservice
    description: UGD_GISSERVICE
  - name: ugd_dataspyid
    description: UGD_DATASPYID
  - name: ugd_updatecount
    description: UGD_UPDATECOUNT
  - name: ugd_gridid
    description: UGD_GRIDID
  - name: ugd_gislayer
    description: UGD_GISLAYER
