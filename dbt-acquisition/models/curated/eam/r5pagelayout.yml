version: 2
models:
- name: r5pagelayout
  columns:
  - name: plo_lastsaved
    description: PLO_LASTSAVED
  - name: plo_elementid
    description: PLO_ELEMENTID
  - name: plo_elementtype
    description: PLO_ELEMENTTYPE
  - name: plo_presentinjsp
    description: PLO_PRESENTINJSP
  - name: plo_attribute
    description: PLO_ATTRIBUTE
  - name: plo_fieldcontainer
    description: PLO_FIELDCONTAINER
  - name: plo_fieldgroup
    description: PLO_FIELDGROUP
  - name: plo_positioningroup
    description: PLO_POSITIONINGROUP
  - name: plo_fieldconttype
    description: PLO_FIELDCONTTYPE
  - name: plo_tabindex
    description: PLO_TABINDEX
  - name: plo_systemattribute
    description: PLO_SYSTEMATTRIBUTE
  - name: plo_changed
    description: PLO_CHANGED
  - name: plo_updatecount
    description: PLO_UPDATECOUNT
  - name: plo_mekey
    description: PLO_MEKEY
  - name: plo_meflag
    description: PLO_MEFLAG
  - name: plo_defaultvalue
    description: PLO_DEFAULTVALUE
  - name: plo_parentpage
    description: PLO_PARENTPAGE
  - name: plo_usergroup
    description: PLO_USERGROUP
  - name: plo_pagename
    description: PLO_PAGENAME
  - name: _deleted
    description: Deleted Record Indicator
  - name: etl_load_datetime
    description: The datetime in which the ETL process loaded the data into the curated
      layer.
  - name: etl_load_metadatafilename
    description: The filename of the metadata file that was used to load the data
      into the curated layer.
  - name: dbt_record_updated_at
    description: The datetime in which the record was last updated by dbt.
  - name: dbt_record_created_at
    description: The datetime in which the record was created by dbt.
  - name: dbt_invocation_id
    description: The invocation ID of the dbt run that created the record.
  - name: dbt_surrogate_key
    description: Hashed key based on primary key/s of table, or all keys excluding
      dbt and etl metadata.
  description: eam_R5PAGELAYOUT
  data_tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns:
        - plo_usergroup
        - plo_pagename
        - plo_elementid
        - plo_meflag
