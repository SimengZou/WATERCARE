    description: CDS_LASTSAVED
  - name: cds_subcategory
    description: CDS_SUBCATEGORY
  - name: cds_level
    description: CDS_LEVEL
  - name: cds_sequence
    description: CDS_SEQUENCE
  - name: cds_updatecount
    description: CDS_UPDATECOUNT
  - name: cds_category
    description: CDS_CATEGORY
  - name: cds_actualsubcat
    description: CDS_ACTUALSUBCAT
  - name: _deleted
    description: Deleted Record Indicator
  - name: etl_load_datetime
